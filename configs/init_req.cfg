
req_init.reason_unaccepted_requests = "Method Not Allowed"
req_init.sip_code_unaccepted_requests = 405

route[REQINIT] {

    if(has_totag())
        return;

    xlog("L_NOTICE", "[REQINIT] Init Request received $ru from $si\n");

	if (is_method("CANCEL")) {
		dlg_manage();
        if (t_check_trans()) {
			route(RELAY);
		}
        xlog("L_NOTICE", "[REQINIT] received $ru, that does not belong to any transaction, let's silently exit.");
		exit;
	}

    if (is_method("REGISTER|PUBLISH")){
        xlog("L_NOTICE", "[REQINIT] Not supporting relaying of $rm request's\n");
        sl_send_reply("$ccp(req_init.sip_code_unaccepted_requests)", "$ccp(req_init.reason_unaccepted_requests)");
        exit;
    }

    if($avp(ds_info) == $null || ($avp(ds_info) != $null && $(avp(ds_info){param.value,type}) != "internal")) {
        remove_hf("Route");
        msg_apply_changes();
    } else {
        loose_route_preloaded(); ## only accepts Route for Internal Hops
    }

    if (is_method("INVITE|SUBSCRIBE")){
        route(RECORD_ROUTE);
        dlg_manage(); ## handle init dialog
    }

    route(SOURCE_ADDR_IS_EXTERNAL);

    return;
}

route[TRUSTED] {

    if($fU =~ "kamonitor")
        return;

    if(is_known_dlg())
        return;

    if(!is_method("REGISTER")) {

        if($sht(untrusted=>$si) == -1)
            drop();

        if($avp(ds_info) != $null)
            return;

        if(!ds_is_from_list()) {
            #!ifdef WITH_FAIL2BAN_SUPPORT
                file_out(FILE_OUT_NAME, "BAN - Not trusted info - to ban: $si");
            #!else
                $sht(untrusted=>$si) = -1;
            #!endif
            drop();
        }

    }

}
